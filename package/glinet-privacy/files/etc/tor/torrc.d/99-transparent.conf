# Snippet for Tor transparent proxy on OpenWrt — merge into /etc/tor/torrc or include via:
#   echo '%%include /etc/tor/torrc.d/99-transparent.conf' >> /etc/tor/torrc
# Adjust LAN / DNS as needed.

User tor
ClientOnly 1

# Transparent TCP (LAN traffic redirected here by firewall)
TransPort 0.0.0.0:9040 IsolateClientAddr IsolateClientProtocol IsolateDestAddr IsolateDestPort

# DNS for Tor (firewall sends LAN DNS here)
DNSPort 0.0.0.0:9053

VirtualAddrNetwork 10.192.0.0/10
AutomapHostsOnResolve 1

# Hardening (optional)
DisableAllSwap 1
