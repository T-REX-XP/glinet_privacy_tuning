# Build glinet-privacy + luci-app-glinet-privacy with the official OpenWrt SDK (Docker).
# Pushes tags v* attach .ipk files to a GitHub Release; other events upload workflow artifacts.

name: OpenWrt packages

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# OpenWrt SDK builds are slow; do not cancel them on branch pushes (new commits queue).
# Pull requests: cancel superseded runs to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  build:
    name: SDK ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Pinned SDK tags (see gh-action-sdk: ARCH = <feed_arch>-<branch>).
        # Do NOT set EXTRA_FEEDS for luci — feeds.conf.default already defines feed "luci"; duplicating it
        # makes ./scripts/feeds die with "Duplicate feed name 'luci'".
        # Match docs/devices.md: Puli (mipsel_24kc), Slate AX / Flint (aarch64_cortex-a53).
        arch:
          - mipsel_24kc-openwrt-24.10
          - aarch64_cortex-a53-openwrt-24.10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: glinet-privacy luci-app-glinet-privacy
          INDEX: 1
          V: sc

      - name: List built packages
        run: find bin -name '*.ipk' -print || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: openwrt-ipk-${{ matrix.arch }}-${{ github.sha }}
          path: bin/packages/**/*.ipk
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/**/*.ipk
          generate_release_notes: true
